name: Collect TDS wait times

# 東京ディズニーシー営業時間（JST 8〜22時）に15分おきで実測待ち時間を収集
# JST = UTC+9 のため UTC 23時台（前日）と 0〜13時台に対応
on:
  schedule:
    - cron: "*/15 23 * * *"
    - cron: "*/15 0-13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Collect wait times
        run: python scripts/collect_to_csv.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/real_waits
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "collect: TDS wait time snapshot [skip ci]"
            git pull --rebase
            git push
          fi
